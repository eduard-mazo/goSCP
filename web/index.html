<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#faf8f4" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#100e0c" media="(prefers-color-scheme: dark)" />
    <title>goSCP — transfer console</title>
    <!--
      Resolve the theme before first paint to avoid a flash of the wrong
      palette. Mirrors the logic in src/lib/theme.ts (key: "goscp.theme").
    -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('goscp.theme')
          var dark =
            saved === 'dark' ||
            (saved !== 'light' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.classList.toggle('dark', dark)
        } catch (e) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
